<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Your Cart</h1>
    </header>
    <section class="cart-page">
       	   <table>
       	  <thead>
      			 <tr>
                    <th>ITEM</th>
            		 <th>PRICE / QTY</th>
                   	<th>SUBTOTAL</th>
    			 </tr>
    
        </thead>
            <tbody id="cart-table-body">
			
			<tr class="total-row">
			    <td colspan="3">
                    Grand Total: <span id="grand-total">0 SAR</span>
			    </td>
			</tr>
			     <tr id="empty-cart-msg">
   				     <td colspan="3">Your cart is empty!</td>
				</tr>
			
			
		    </tbody>
        </table>
     	 <a href="checkout.html" class="checkout-button">Checkout</a>
    </section>
<script>
    
    function loadCart() {
        const cartTable = document.getElementById('cart-table-body');
        const cart = JSON.parse(sessionStorage.getItem('myCart')) || [];
        
        if (cart.length === 0) {
            cartTable.innerHTML = '<tr><td colspan="3">Your cart is empty!</td></tr>';
            document.getElementById('grand-total').innerText = "0 SAR";
            return;
        }

        cartTable.innerHTML = ""; 

        cart.forEach((item, index) => {
           
            const row = `
                <tr class="cart-item">
                    <td>${item.name}</td>
                    <td>
                        <input type="number" class="quantity" value="1" min="1" 
                               data-price="${item.price}" oninput="calculateTotal()"> 
                        * ${item.price} SAR
                    </td>
                    <td class="subtotal">${item.price} SAR</td>
                </tr>`;
            cartTable.innerHTML += row;
        });

        calculateTotal(); 
    }

   
    function calculateTotal() {
        let total = 0;
        const items = document.querySelectorAll('.cart-item');

        items.forEach(item => {
            const input = item.querySelector('.quantity');
            const price = parseFloat(input.getAttribute('data-price'));
            let qty = parseInt(input.value) || 1;
            const subtotal = price * qty;
            item.querySelector('.subtotal').innerText = subtotal + " SAR";
            
            total += subtotal;
        });

        document.getElementById('grand-total').innerText = total + " SAR";
    }

    window.onload = loadCart;
</script>
</body>
</html>
