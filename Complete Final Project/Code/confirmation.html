<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmation - Food Ordering Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header">
    <h1 class="page-title">Food Ordering Website</h1>
    <div class="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav class="nav-menu" id="navMenu">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
      <a href="confirmation.html">Confirmation</a>
    </nav>
  </div>

  <div class="confirmation-image-wrapper">
    <img src="burger.jpg" alt="Order Confirmation" class="confirmation-img" />
    <p class="confirmation-overlay-text">Your Order is Confirmed!</p>
  </div>

  <div class="btn-wrapper">
    <a href="index.html">
      <button class="btn-home">Back to Home</button>
    </a>
  </div>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("navMenu");
      if (menu.style.display === "block") {
        menu.style.display = "none";
      } else {
        menu.style.display = "block";
      }
    }
  </script>

</body>
</html>
