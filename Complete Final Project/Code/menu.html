<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box fade-in">

    <div class="bar">
        <h1>Menu</h1>
        <div class="icon">≡</div>
    </div>

    <div class="menu slide-in">

        <table>
            <thead>
                <tr>
                    <th>IMAGE</th>
                    <th>ITEM</th>
                    <th>PRICE</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><img src="burger.jpg" class="menu-img"></td>
                    <td>CHEESEBURGER</td>
                    <td>20 SAR</td>
                    <td><button class="add-to-cart-btn add-btn" data-item="CHEESEBURGER">Add to Cart</button></td>
                </tr>

                <tr>
                    <td><img src="pasta.jpg" class="menu-img"></td>
                    <td>PASTA</td>
                    <td>25 SAR</td>
                    <td><button class="add-to-cart-btn add-btn" data-item="PASTA">Add to Cart</button></td>
                </tr>

                <tr>
                    <td><img src="pepperoni pizza.jpg" class="menu-img"></td>
                    <td>PEPPERONI PIZZA</td>
                    <td>30 SAR</td>
                    <td><button class="add-to-cart-btn add-btn" data-item="PEPPERONI PIZZA">Add to Cart</button></td>
                </tr>

                <tr>
                    <td><img src="cold drink.jpg" class="menu-img"></td>
                    <td>COLD DRINK</td>
                    <td>5 SAR</td>
                    <td><button class="add-to-cart-btn add-btn" data-item="COLD DRINK">Add to Cart</button></td>
                </tr>

                <tr>
                    <td><img src="water.jpg" class="menu-img"></td>
                    <td>WATER</td>
                    <td>1 SAR</td>
                    <td><button class="add-to-cart-btn add-btn" data-item="WATER">Add to Cart</button></td>
                </tr>
            </tbody>
        </table>

        <a href="cart.html" style="display: block !important; width: 180px !important; margin: 20px auto !important; padding: 12px !important; background-color: #f8b4b4 !important; color: black !important; text-align: center !important; text-decoration: none !important; border-radius: 50px !important; font-weight: bold !important; font-family: sans-serif !important;">Go to Cart</a>
    </div>

</div>

<script src="script.js"></script>
<script>
function addToCart(name, price) {
    let cart = JSON.parse(sessionStorage.getItem('myCart')) || [];

    cart.push({ name: name, price: price });

    sessionStorage.setItem('myCart', JSON.stringify(cart));

    alert(name + " added to cart!");
}

document.querySelectorAll('.add-btn').forEach(button => {
    button.addEventListener('click', function() {
        const itemName = this.getAttribute('data-item');

        const prices = {
            'CHEESEBURGER': 20,
            'PASTA': 25,
            'PEPPERONI PIZZA': 30,
            'COLD DRINK': 5,
            'WATER': 1
        };

        addToCart(itemName, prices[itemName]);
    });
});
</script>
</body>
</html>
